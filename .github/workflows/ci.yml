# GitHub Actions CI/CD Pipeline
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: benocode_test
          POSTGRES_USER: benocode
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npm run prisma:generate

      - name: Run unit tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://benocode:test_password@localhost:5432/benocode_test
          JWT_SECRET: test-secret-key-that-is-at-least-32-chars-long!!
          JWT_EXPIRES_IN: 7d
          CSRF_SECRET: test-csrf-secret-that-is-at-least-32-chars!!!
          BREVO_API_KEY: test-brevo-api-key
          BREVO_SENDER_EMAIL: test@example.com
          ADMIN_EMAIL: admin@example.com
          CORS_ORIGIN: http://localhost:3000
        run: npm test

      - name: Run integration tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://benocode:test_password@localhost:5432/benocode_test
          JWT_SECRET: test-secret-key-that-is-at-least-32-chars-long!!
          JWT_EXPIRES_IN: 7d
          CSRF_SECRET: test-csrf-secret-that-is-at-least-32-chars!!!
          BREVO_API_KEY: test-brevo-api-key
          BREVO_SENDER_EMAIL: test@example.com
          ADMIN_EMAIL: admin@example.com
          CORS_ORIGIN: http://localhost:3000
        run: npm run test:integration

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run tests
        working-directory: ./frontend
        run: npm test
      
      - name: Type check
        working-directory: ./frontend
        run: npm run type-check
      
      - name: Lint
        working-directory: ./frontend
        run: npm run lint

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend-tests]
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: benocode_test
          POSTGRES_USER: benocode
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps
      
      - name: Setup backend for E2E tests
        working-directory: ./backend
        run: |
          npm ci
          npm run prisma:generate
        env:
          DATABASE_URL: postgresql://benocode:test_password@localhost:5432/benocode_test

      - name: Apply database schema
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://benocode:test_password@localhost:5432/benocode_test
        run: npx prisma db push --accept-data-loss

      - name: Seed database
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://benocode:test_password@localhost:5432/benocode_test
          ADMIN_EMAIL: admin@benocode.sk
          ADMIN_PASSWORD: Admin123!@#
        run: npx tsx prisma/seed.ts

      - name: Build and start backend
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://benocode:test_password@localhost:5432/benocode_test
          NODE_ENV: test
          PORT: 3001
          JWT_SECRET: test-jwt-secret-min-32-characters-long-for-testing-!!
          CSRF_SECRET: test-csrf-secret-min-32-characters-long-for-testing!!
          BREVO_API_KEY: test-brevo-api-key
          BREVO_SENDER_EMAIL: test@example.com
          ADMIN_EMAIL: admin@benocode.sk
          CORS_ORIGIN: http://localhost:3000
        run: npm run build && node dist/index.js &

      - name: Build and start frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
        run: npm run build && npm start &

      - name: Wait for backend and frontend
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:3001/health; do sleep 1; done'
          timeout 90 bash -c 'until curl -sfL http://localhost:3000/en; do sleep 2; done'

      - name: Run E2E tests
        working-directory: ./frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
          E2E_ADMIN_EMAIL: admin@benocode.sk
          E2E_ADMIN_PASSWORD: Admin123!@#
        run: npx playwright test --project=setup --project=public-chromium --project=admin-unauth --project=admin-auth

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e-tests]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Build backend
        working-directory: ./backend
        run: |
          npm ci
          npm run build
      
      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

